<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./dist/output.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Calculator</title>
  </head>

  <body
    class="bg-indigo-400 flex flex-col items-center justify-center min-h-screen"
  >
    <div class="grid grid-cols-1 w-80 ml-4 sm:w-70">
      <h3 class="ml-0 text-white font-bold">Calculator</h3>

      <!-- Display -->
      <input
        id="expression"
        type="text"
        readonly
        class="bg-blue-950 mt-4 p-3 rounded-lg text-white font-bold text-right"
      />

      <!-- Buttons -->
      <div class="grid grid-cols-4 mt-4 bg-blue-900 p-3 gap-2 rounded-lg h-80">
        <button
          class="bg-white shadow-inner rounded-md font-bold active:bg-slate-200"
        >
          7
        </button>
        <button
          class="bg-white shadow-inner rounded-md font-bold active:bg-slate-200"
        >
          8
        </button>
        <button
          class="bg-white shadow-inner rounded-md font-bold active:bg-slate-200"
        >
          9
        </button>
        <button
          class="bg-indigo-500 shadow-inner rounded-md font-bold active:bg-indigo-600"
        >
          DEL
        </button>

        <button
          class="bg-white shadow-inner rounded-md font-bold active:bg-slate-200"
        >
          4
        </button>
        <button
          class="bg-white shadow-inner rounded-md font-bold active:bg-slate-200"
        >
          5
        </button>
        <button
          class="bg-white shadow-inner rounded-md font-bold active:bg-slate-200"
        >
          6
        </button>
        <button
          class="bg-white shadow-inner rounded-md font-bold active:bg-slate-200"
        >
          +
        </button>

        <button
          class="bg-white shadow-inner rounded-md font-bold active:bg-slate-200"
        >
          1
        </button>
        <button
          class="bg-white shadow-inner rounded-md font-bold active:bg-slate-200"
        >
          2
        </button>
        <button
          class="bg-white shadow-inner rounded-md font-bold active:bg-slate-200"
        >
          3
        </button>
        <button
          class="bg-white shadow-inner rounded-md font-bold active:bg-slate-200"
        >
          -
        </button>

        <button
          class="bg-white shadow-inner rounded-md font-bold active:bg-slate-200"
        >
          .
        </button>
        <button
          class="bg-white shadow-inner rounded-md font-bold active:bg-slate-200"
        >
          0
        </button>
        <button
          class="bg-white shadow-inner rounded-md font-bold active:bg-slate-200"
        >
          /
        </button>
        <button
          class="bg-white shadow-inner rounded-md font-bold active:bg-slate-200"
        >
          *
        </button>

        <button
          class="bg-indigo-500 shadow-inner rounded-md col-span-2 font-bold active:bg-indigo-600"
        >
          Reset
        </button>
        <button
          class="bg-red-500 shadow-inner rounded-md col-span-2 font-bold active:bg-red-600"
        >
          =
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
